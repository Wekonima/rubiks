<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLL gampang</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
padding:8px 16px;
border:none;
border-radius:6px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.stat{
padding:10px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.stat.mahir{background:#22c55e;}
.stat.progress{background:#f59e0b;}
.stat.none{background:#ef4444;}

.container{
max-width:900px;
margin:auto;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.case{
font-size:14px;
color:#38bdf8;
cursor:pointer;
}

.alg{
font-size:22px;
font-family:monospace;
margin-top:6px;
}

select{
padding:6px;
border-radius:6px;
border:none;
}

.none{background:#ef4444;color:white;}
.progress{background:#f59e0b;color:white;}
.mahir{background:#22c55e;color:white;}

#timerPage{
display:none;
text-align:center;
margin-top:120px;
}

#timer{
font-size:90px;
font-weight:bold;
}

/* preview cube */

#cubeImage{
position:fixed;
left:150px;
bottom:420px;
width:250px;
display:none;
border-radius:10px;
box-shadow:0 0 20px black;
}

/* mobile preview */

@media (max-width:700px){

#cubeImage{
left:50%;
transform:translateX(-50%);
bottom:120px;
width:200px;
}

}

</style>
</head>

<body>

<div class="topbar">
<h2>MoyuBetterThanGAN🤫</h2>
<button onclick="toggleMode()">Timer</button>
</div>

<div id="practicePage">

<div class="stats">
<div class="stat mahir">Mahir <span id="mahirCount">0</span></div>
<div class="stat progress" id="progressStat">Progress <span id="progressCount">0</span></div>
<div class="stat none">None <span id="noneCount">0</span></div>
</div>

<div class="container" id="pllList"></div>

</div>

<div id="timerPage">
<div id="timer">0.000</div>
<p>Tekan SPACE to start / stop</p>
</div>

<img id="cubeImage">

<script>

const pllData=[

{case:"Ua",alg:"M’2 U M U2 M’ U M’2",img:"images/Ua.webp"},
{case:"Ub",alg:"M’2 U’M U2M’U’M’2",img:"images/Ub.webp"},
{case:"H",alg:"M’2UM’2U2M’2UM’2",img:"images/H.webp"},
{case:"Z",alg:"M’U(M’2U)2M’U2M’2U’",img:"images/Z.webp"},
{case:"Aa",alg:"x’R2D2(R’U’R) D2(R’UR’)",img:"images/Aa.webp"},
{case:"Ab",alg:"x'(RU’R)D2(R’UR)D2R’2",img:"images/Ab.webp"},
{case:"E",alg:"x'(RU’R’D)(RUR’D’)(RU’R’D’)",img:"images/E.webp"},
{case:"T",alg:"(RUR’U’)(R’F)(R2U’R’U’)(RUR’F’)",img:"images/T.webp"},
{case:"F",alg:"(R’U’F’)(RUR’U’)(R’F)(R2U’R’U’)(RUR’UR)",img:"images/F.webp"},
{case:"V",alg:"(R’UR’d’)(R’F’R2U’)(R’UR’FRF)",img:"images/V.webp"},
{case:"Y",alg:"F(RU’R’U’)(RUR’F’)(RUR’U’)(R’FRF’)",img:"images/Y.webp"},
{case:"Ja",alg:"z(U’RD’)(R2UR’U’)(R2U)(DR’)",img:"images/Ja.webp"},
{case:"Jb",alg:"(RUR’F’)(RUR’U’)(R’F)(R2U’R’U’)",img:"images/Jb.webp"},
{case:"Rb",alg:"(R’U2)(RU’U’)(R’FRUR’U’)(R’F’R2U’)",img:"images/Rb.webp"},
{case:"Ra",alg:"(RU’R’U’)(RURD)(R’U’RD’)(R’U2R’U’)",img:"images/Ra.webp"},
{case:"Gc",alg:"(R’2u’RU’R)(UR’u)(R2fR’f’)",img:"images/Gc.webp"},
{case:"Gd",alg:"(RUR’)y'(R2u’RU’)(R’UR’uR2)",img:"images/Gd.webp"},
{case:"Ga",alg:"(R2uR’)(UR’U’Ru’)(R’2F’UF)",img:"images/Ga.webp"},
{case:"Gb",alg:"(R2uR’)(UR’U’Ru’)(R’2F’UF)",img:"images/Gb.webp"},
{case:"Nb",alg:"(R’URU’)(R’F’U’)(FRUR’F)(R’F’RU’R)",img:"images/Nb.webp"},
{case:"Na",alg:"(RUR’U)(RUR’F’)(RUR’U’)(R’F)(R2U’R’U2)(RU’R’)",img:"images/Na.png"}

]

const container=document.getElementById("pllList")
const imgPreview=document.getElementById("cubeImage")

function updateStats(){

let mahir=0
let progress=0
let none=0

pllData.forEach((_,i)=>{

let val=localStorage.getItem("pll"+i)||"none"

if(val==="mahir") mahir++
else if(val==="progress") progress++
else none++

})

document.getElementById("mahirCount").innerText=mahir
document.getElementById("progressCount").innerText=progress
document.getElementById("noneCount").innerText=none

}

pllData.forEach((pll,index)=>{

let saved=localStorage.getItem("pll"+index)||"none"

const card=document.createElement("div")
card.className="card"
card.id="pll"+index

card.innerHTML=`

<div>
<div class="case">${pll.case}</div>
<div class="alg">${pll.alg}</div>
</div>

<select data-id="${index}" class="${saved}">
<option value="none">None</option>
<option value="progress">Progress</option>
<option value="mahir">Mahir</option>
</select>
`

container.appendChild(card)

const select=card.querySelector("select")
select.value=saved

select.addEventListener("change",function(){

localStorage.setItem("pll"+index,this.value)
this.className=this.value
updateStats()

})

const caseName=card.querySelector(".case")

/* DESKTOP HOVER */

caseName.addEventListener("mouseenter",()=>{
imgPreview.src=pll.img
imgPreview.style.display="block"
})

caseName.addEventListener("mouseleave",()=>{
imgPreview.style.display="none"
})

/* MOBILE HOLD */

caseName.addEventListener("touchstart",()=>{
imgPreview.src=pll.img
imgPreview.style.display="block"
})

caseName.addEventListener("touchend",()=>{
imgPreview.style.display="none"
})

})

updateStats()

/* SCROLL KE PROGRESS */

document.getElementById("progressStat").onclick=function(){

for(let i=0;i<pllData.length;i++){

let val=localStorage.getItem("pll"+i)

if(val==="progress"){

document.getElementById("pll"+i).scrollIntoView({
behavior:"smooth",
block:"center"
})

break
}

}

}

let practice=true

function toggleMode(){

practice=!practice

document.getElementById("practicePage").style.display=practice?"block":"none"
document.getElementById("timerPage").style.display=practice?"none":"block"

}

let timerRunning=false
let startTime=0
let interval

document.addEventListener("keydown",function(e){

if(e.code==="Space"){

if(practice) return

if(!timerRunning){

startTime=Date.now()

interval=setInterval(()=>{

let time=(Date.now()-startTime)/1000
document.getElementById("timer").innerText=time.toFixed(3)

},10)

timerRunning=true

}else{

clearInterval(interval)
timerRunning=false

}

}

})

</script>

</body>
</html>
